<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c6cfc"/>
      <stop offset="100%" stop-color="#a99fff"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Brilho sutil no topo -->
  <ellipse cx="256" cy="140" rx="180" ry="80" fill="rgba(124,108,252,0.12)"/>
  <!-- Avião -->
  <text x="256" y="310" font-size="240" text-anchor="middle" dominant-baseline="middle">✈️</text>
  <!-- Linha de destaque -->
  <rect x="80" y="380" width="352" height="3" rx="2" fill="url(#glow)" opacity="0.6"/>
  <!-- Texto AVIÕES -->
  <text x="256" y="440" font-family="'Arial Black', sans-serif" font-size="54" font-weight="900"
        fill="url(#glow)" text-anchor="middle" letter-spacing="8">AVIÕES</text>
</svg>
